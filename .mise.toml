# mise tool version management for career-ops

[tools]
go = "1.24"

# Task runner
"go:github.com/go-task/task/v3/cmd/task" = "3.49.1"

# Live reload
"go:github.com/air-verse/air" = "1.64.5"

# Linter (handles formatting too)
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "2.11.4"

# Import organizer
"go:golang.org/x/tools/cmd/goimports" = "0.43.0"

# Git hooks
lefthook = "2.1.5"

# Vulnerability scanner
"go:golang.org/x/vuln/cmd/govulncheck" = "1.1.4"
