# mise tool version management for career-ops

[tools]
go = "1.24"

# Task runner
"go:github.com/go-task/task/v3/cmd/task" = "latest"

# Live reload
"go:github.com/air-verse/air" = "latest"

# Linter (handles formatting too)
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "latest"

# Import organizer
"go:golang.org/x/tools/cmd/goimports" = "latest"

# Git hooks
"go:github.com/evilmartians/lefthook" = "latest"

# Vulnerability scanner
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"
